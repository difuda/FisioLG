<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Gestión - Clínica Fisiolg</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar-scheduler@6.1.8/index.global.min.js"></script>
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
                        url("/img/fondocalendario.png");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', sans-serif;
        }

        #calendar {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.94);
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .fc-event {
            border-radius: 8px !important;
            border: none !important;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 2px 5px;
            font-weight: 600 !important;
            cursor: pointer;
        }

        .admin-header h2 {
            color: white;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.9);
            font-size: 2.2rem;
            letter-spacing: -1px;
        }

        .card {
            background: rgba(255, 255, 255, 0.9) !important;
            border-radius: 20px;
            border: none;
            backdrop-filter: blur(5px);
        }


        @media (max-width: 768px) {
             body {
                    padding: 10px;
             }

             #calendar {
                    padding: 10px;
                    border-radius: 15px;
             }


             .admin-header h2 {
                    font-size: 1.4rem !important;
             }


             .fc-timegrid-slot-label-cushion,
                .fc-event-title {
                    font-size: 0.75rem !important;
             }


             .btn-outline-light {
                    padding: 5px 10px;
                    font-size: 0.8rem;
             }


             .card-body .row {
                    flex-direction: column;
             }
             .card-body .col-auto {
                    width: 100%;
                    margin-bottom: 10px;
             }
             .card-body button {
                    width: 100%;
             }
        }

        .fc-license-message {
            display: none !important;
        }


        .fc-timegrid-slot-label-cushion {
            font-weight: 600;
            color: #333;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4 px-4 admin-header">
        <div>
            <h2 class="fw-bold text-white">Gestión de Agendas</h2>
            <p class="text-info">Bienvenido, <span id="nombreAdmin" class="fw-bold text-white"></span></p>
        </div>
        <button onclick="logout()" class="btn btn-outline-light">Cerrar Sesión</button>
    </div>

    <div class="card mb-4 shadow-sm border-0" style="max-width: 600px; margin: 0 auto;">
        <div class="card-body rounded">
            <h5 class="card-title fw-bold mb-3">Planificar día</h5>
            <form id="formGenerar" class="row g-3">
                <div class="col-auto">
                    <input type="date" id="fechaGenerar" class="form-control" required>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-success fw-bold d-flex align-items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-calendar-check" viewBox="0 0 16 16">
                            <path d="M10.854 7.146a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708 0l-1.5-1.5a.5.5 0 1 1 .708-.708L7.5 9.793l2.646-2.647a.5.5 0 0 1 .708 0z"/>
                            <path d="M3.5 0a.5.5 0 0 1 .5.5V1h8V.5a.5.5 0 0 1 1 0V1h1a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V3a2 2 0 0 1 2-2h1V.5a.5.5 0 0 1 .5-.5zM1 4v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4H1z"/>
                        </svg>
                        Abrir Jornada
                    </button>

                </div>
            </form>
            <div id="mensajeFeedback" class="mt-2 small"></div>
        </div>
    </div>

    <div id="calendar"></div>
</div>

<script>
    if (!localStorage.getItem('userName')) {
        window.location.href = "login.html";
    }
    document.getElementById('nombreAdmin').textContent = localStorage.getItem('userName');

    let calendar;

    document.addEventListener('DOMContentLoaded', function() {
        const calendarEl = document.getElementById('calendar');

        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'resourceTimeGridDay',
            locale: 'es',
            height: 'auto',
            contentHeight: 'auto',


            slotLabelFormat: {
                hour: 'numeric',
                minute: '2-digit',
                omitZeroMinute: false,
                meridiem: 'short'
            },


            slotMinTime: '09:00:00',
            slotMaxTime: '21:00:00',
            slotDuration: '00:40:00',
            allDaySlot: false,
            displayEventTime: false,
            expandRows: true,

            headerToolbar: (window.innerWidth < 768) ? {
                left: 'prev,next',
                center: 'title',
                right: ''
            } : {
                left: 'prev,next today',
                center: 'title',
                right: 'resourceTimeGridDay,resourceTimeGridWeek'
            },
            resources: [
                { id: '1', title: 'Ánxela', eventBackgroundColor: '#E3F2FD' },
                { id: '2', title: 'Lucía Garza', eventBackgroundColor: '#E8F5E9' }
            ],
            events: '/api/citas/admin/todas',

            eventDataTransform: function(eventData) {
                if (!eventData.fechaHora) return null;
                const fechaInicio = new Date(eventData.fechaHora);
                const resId = eventData.fisioId ? eventData.fisioId.toString() : '1';

                let textoMostrar = 'DISPONIBLE';
                let colorFondo = (resId === '2') ? '#28a745' : '#007bff';

                if (eventData.estado === 'CONFIRMADA') {
                    const nombrePaciente = eventData.pacienteNombre || (eventData.paciente ? eventData.paciente.nombre : null);

                    if (nombrePaciente) {
                        textoMostrar = nombrePaciente.toUpperCase();
                    } else if (eventData.notasClinicas && eventData.notasClinicas !== 'LIBRE INTERNO') {
                        textoMostrar = eventData.notasClinicas.toUpperCase();
                    } else {
                        textoMostrar = 'RESERVADA';
                    }

                    colorFondo = '#444444';
                }

                const fechaFin = new Date(fechaInicio.getTime() + 40 * 60000);

                return {
                    id: eventData.id,
                    resourceId: resId,
                    title: textoMostrar,
                    start: fechaInicio.toISOString(),
                    end: fechaFin.toISOString(),
                    backgroundColor: colorFondo,
                    borderColor: colorFondo,
                    textColor: '#ffffff',
                    extendedProps: { estado: eventData.estado }
                };
            },

           eventClick: async function(info) {
                const estadoActual = info.event.extendedProps.estado;
                const citaId = info.event.id;

                if (estadoActual === 'CONFIRMADA') {
                    const respuesta = confirm(`Cita de ${info.event.title}\n\n¿Quieres ANULAR esta reserva?`);
                    if (respuesta) {
                        try {
                            const response = await fetch(`/api/citas/reservar-manual/${citaId}?nombre=`, { method: 'PUT' });
                            if (response.ok) {
                                alert("Cita liberada.");
                                calendar.refetchEvents();
                            }
                        } catch (error) { alert("Error al anular."); }
                    }
                    return;
                }

                const nombre = prompt("Nombre del paciente:");
                if (nombre && nombre.trim() !== "") {
                    try {
                        const response = await fetch(`/api/citas/reservar-manual/${citaId}?nombre=${encodeURIComponent(nombre)}`, { method: 'PUT' });
                        if (response.ok) {
                            alert("¡Reservado!");
                            calendar.refetchEvents();
                        }
                    } catch (error) { alert("Error al reservar."); }
                }
            }
        });

        calendar.render();

        document.getElementById('formGenerar').addEventListener('submit', async function(e) {
            e.preventDefault();
            const fecha = document.getElementById('fechaGenerar').value;
            const feedback = document.getElementById('mensajeFeedback');

            try {
                const response = await fetch(`/api/citas/generar-jornada?fecha=${fecha}`, { method: 'POST' });
                if (response.ok) {
                    feedback.className = "mt-2 small text-success";
                    feedback.textContent = "¡Éxito! Agenda creada.";
                    calendar.refetchEvents();
                } else {
                    feedback.className = "mt-2 small text-danger";
                    feedback.textContent = "Error. ¿Ya existe esa fecha?";
                }
            } catch (error) { feedback.textContent = "Error de conexión."; }
        });
    });

    function logout() {
        localStorage.clear();
        window.location.href = "login.html";
    }
</script>
</body>
</html>
