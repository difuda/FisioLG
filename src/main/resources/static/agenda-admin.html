<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Gestión - Clínica Fisiolg</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar-scheduler@6.1.10/index.global.min.js"></script>
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
                        url("img/fondocalendario.png");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', sans-serif;
        }

        #calendar {
            max-width: 1100px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .fc-license-message { display: none !important; }

        .admin-header h2 { color: white; text-shadow: 2px 2px 8px rgba(0,0,0,0.8); }

        .card-gestion {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            border: none;
            max-width: 1100px;
            margin: 0 auto 20px auto;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4 px-4 admin-header">
        <div>
            <h2 class="fw-bold">Gestión de Clínica</h2>
            <p class="text-white">Panel de Administración</p>
        </div>
        <button onclick="logout()" class="btn btn-danger btn-sm">Cerrar Sesión</button>
    </div>

    <div id="alertaSeleccion" class="alert alert-success d-none mb-3 shadow-sm" style="max-width: 600px; margin: 0 auto;">
        <div class="d-flex justify-content-between align-items-center">
            <span><i class="bi bi-person-check-fill"></i> Paciente: <strong id="nombreSeleccionado"></strong></span>
            <button class="btn btn-sm btn-outline-success" onclick="cancelarSeleccion()">Cancelar</button>
        </div>
    </div>

    <div class="card card-gestion shadow-sm p-3">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="fw-bold mb-1">Buscar Paciente:</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                    <input type="text" id="busquedaPaciente" class="form-control" placeholder="Nombre o DNI..." onkeyup="buscarPacientes()">
                </div>
                <div id="resultadosBusqueda" class="list-group mt-2 position-absolute shadow" style="z-index: 1000; width: 45%;"></div>
            </div>
            <div class="col-md-6">
                <label class="fw-bold mb-1">Generar Jornada:</label>
                <form id="formGenerar" class="input-group">
                    <input type="date" id="fechaGenerar" class="form-control" required>
                    <button type="submit" class="btn btn-success">Abrir Día</button>
                </form>
            </div>
        </div>
    </div>

    <div id="calendar"></div>
</div>

<div class="modal fade" id="modalHistorial" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Historial de <span id="nombrePacienteHistorial"></span></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="contenidoHistorial"></div>
        </div>
    </div>
</div>

<script>
    let calendar;
    let pacienteSeleccionadoParaCita = null;

    document.addEventListener('DOMContentLoaded', function() {
        const calendarEl = document.getElementById('calendar');

        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'resourceTimeGridDay',
            locale: 'es',
            slotMinTime: '09:00:00',
            slotMaxTime: '21:00:00',
            slotDuration: '00:40:00',
            allDaySlot: false,
            resources: [
                { id: '1', title: 'Lucía Garza' },
                { id: '2', title: 'Ánxela' }
            ],
            events: 'http://localhost:8080/api/citas/admin/todas',

            eventDataTransform: function(eventData) {
                const resId = eventData.fisioId ? eventData.fisioId.toString() : '1';
                let isConfirmed = (eventData.estado === 'CONFIRMADA' || eventData.estado === 'RESERVADO');

                return {
                    id: eventData.id,
                    resourceId: resId,
                    title: isConfirmed ? (eventData.pacienteNombre || 'OCUPADO').toUpperCase() : 'LIBRE',
                    start: eventData.fechaHora,
                    end: new Date(new Date(eventData.fechaHora).getTime() + 40 * 60000).toISOString(),
                    backgroundColor: isConfirmed ? '#444' : '#E8F5E9',
                    textColor: isConfirmed ? '#fff' : '#2e7d32',
                    extendedProps: { estado: eventData.estado }
                };
            },

            eventClick: async function(info) {
                const citaId = info.event.id;


                if (pacienteSeleccionadoParaCita) {
                    if (confirm(`¿Asignar a ${pacienteSeleccionadoParaCita.nombre} a las ${info.event.start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}?`)) {
                        const resp = await fetch(`http://localhost:8080/api/citas/actualizar/${citaId}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                pacienteId: pacienteSeleccionadoParaCita.id,
                                notasClinicas: "Cita asignada por Admin"
                            })
                        });
                        if (resp.ok) {
                            cancelarSeleccion();
                            calendar.refetchEvents();
                        }
                    }
                } else if (info.event.extendedProps.estado !== 'LIBRE') {

                    if (confirm("¿Quieres liberar este hueco?")) {
                        await fetch(`http://localhost:8080/api/citas/actualizar/${citaId}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ pacienteId: null })
                        });
                        calendar.refetchEvents();
                    }
                }
            }
        });

        calendar.render();


        document.getElementById('formGenerar').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fecha = document.getElementById('fechaGenerar').value;
            const resp = await fetch(`http://localhost:8080/api/citas/generar-jornada?fecha=${fecha}`, { method: 'POST' });
            if (resp.ok) calendar.refetchEvents();
        });
    });

    async function buscarPacientes() {
        const term = document.getElementById('busquedaPaciente').value;
        const resDiv = document.getElementById('resultadosBusqueda');
        if (term.length < 2) { resDiv.innerHTML = ''; return; }

        const resp = await fetch(`http://localhost:8080/api/pacientes/buscar?term=${term}`);
        const pacientes = await resp.json();

        resDiv.innerHTML = pacientes.map(p => `
            <button class="list-group-item list-group-item-action" onclick="seleccionarPaciente(${p.id}, '${p.nombre} ${p.apellidos}')">
                ${p.nombre} ${p.apellidos} (${p.dni})
            </button>
        `).join('');
    }

    function seleccionarPaciente(id, nombre) {
        pacienteSeleccionadoParaCita = { id, nombre };
        document.getElementById('nombreSeleccionado').innerText = nombre;
        document.getElementById('alertaSeleccion').classList.remove('d-none');
        document.getElementById('resultadosBusqueda').innerHTML = '';
    }

    function cancelarSeleccion() {
        pacienteSeleccionadoParaCita = null;
        document.getElementById('alertaSeleccion').classList.add('d-none');
    }

    function logout() { localStorage.clear(); window.location.href = "index.html"; }
</script>
</body>
</html>
