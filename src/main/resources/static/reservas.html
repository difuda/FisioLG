<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Reserva - FisioLG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --verde: #88c057; --azul: #2c3e50; }
        body {
            background: var(--azul); font-family: 'Segoe UI', sans-serif;
            margin: 0; min-height: 100vh; display: flex; flex-direction: column;
        }
        body::before {
            content: ""; position: fixed; inset: 0;
            background: url('img/fondocalendario.png') center/cover;
            opacity: 0.3; z-index: -1;
        }
        .main-content { flex: 1; display: flex; align-items: center; padding: 40px 20px; }
        .card-reserva {
            max-width: 500px; margin: auto; background: white;
            padding: 35px; border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        .form-control { border-radius: 12px; padding: 12px; margin-bottom: 12px; background: #f9fbfc; border: 1px solid #eee; }
        .form-control:read-only { background-color: #e9ecef; color: #6c757d; cursor: not-allowed; }
        .btn-main {
            background: var(--verde); color: white; border: none;
            padding: 15px; border-radius: 12px; width: 100%;
            font-weight: bold; transition: 0.3s;
        }
        footer { background: rgba(0, 0, 0, 0.7); color: white; padding: 20px; text-align: center; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="main-content">
    <div class="card-reserva">
        <h2 id="tituloPrincipal" class="text-center fw-bold mb-4" style="color: var(--azul)">¿Cómo quieres continuar?</h2>

        <div id="eleccionInicial" class="d-grid gap-3">
            <button class="btn btn-outline-dark py-3 fw-bold" onclick="mostrarFormulario('invitado')">
                RESERVAR COMO INVITADO
            </button>
            <button class="btn btn-primary py-3 fw-bold" onclick="mostrarFormulario('miembro')" style="background-color: var(--verde); border:none;">
                QUIERO SER MIEMBRO (Y GESTIONAR MIS CITAS)
            </button>
        </div>

        <div id="alertaReserva" class="alert d-none" role="alert" style="border-radius: 12px; font-size: 14px;"></div>

        <form id="formFinal" class="d-none">
            <div class="row g-2">
                <div class="col-6"><input type="text" id="nom" class="form-control" placeholder="Nombre" required></div>
                <div class="col-6"><input type="text" id="ape" class="form-control" placeholder="Apellidos" required></div>
            </div>

            <label class="small text-muted ms-1">Email validado:</label>
            <input type="email" id="email" class="form-control" readonly>

            <input type="text" id="dni" class="form-control" placeholder="DNI (12345678Z)" required>
            <input type="tel" id="tel" class="form-control" placeholder="Teléfono móvil" required>

            <div id="campoPassword" class="d-none">
                <label class="small fw-bold text-success ms-1">Crea una contraseña para tu cuenta:</label>
                <input type="password" id="pass" class="form-control" placeholder="Mínimo 6 caracteres">
            </div>

            <div class="form-check mb-3 mt-2">
                <input class="form-check-input" type="checkbox" id="rgpd" required>
                <label class="form-check-label small text-muted" for="rgpd">Acepto la política de protección de datos.</label>
            </div>

            <button type="submit" id="btnConfirmar" class="btn-main shadow-sm">CONFIRMAR MI CITA</button>
            <button type="button" class="btn btn-link btn-sm w-100 mt-2 text-muted" onclick="location.reload()">Volver atrás</button>
        </form>
    </div>
</div>

<div class="modal fade" id="modalExito" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-center" style="border-radius: 20px; border: none;">
            <div class="modal-body p-5">
                <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
                <h3 class="fw-bold mt-3">¡Todo listo!</h3>
                <p class="text-muted">Tu cita ha sido confirmada con éxito. Te esperamos en FisioLG.</p>
                <button onclick="location.href='index.html'" class="btn btn-success w-100 py-3 mt-3" style="border-radius: 12px; background: #88c057; border: none;">VOLVER AL INICIO</button>
            </div>
        </div>
    </div>
</div>

<footer>
    <div class="container">
        <p class="mb-1 fw-bold">Clínica Lucía Garza</p>
        <p class="mb-0 text-muted small">© 2026 FisioLG - Gestión de Fisioterapia</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let modoRegistro = 'invitado';
    const citaId = new URLSearchParams(window.location.search).get('citaId') || sessionStorage.getItem('citaIdReserva');


    function mostrarFormulario(modo) {
        modoRegistro = modo;
        document.getElementById('eleccionInicial').classList.add('d-none');
        document.getElementById('formFinal').classList.remove('d-none');

        const titulo = document.getElementById('tituloPrincipal');

        if(modo === 'miembro') {
            titulo.innerText = "Registro de Miembro";
            document.getElementById('campoPassword').classList.remove('d-none');
            document.getElementById('pass').required = true;
        } else {
            titulo.innerText = "Datos de Invitado";
            document.getElementById('campoPassword').classList.add('d-none');
            document.getElementById('pass').required = false;
        }


        document.getElementById('nom').value = sessionStorage.getItem('userNombre') || '';
        document.getElementById('ape').value = sessionStorage.getItem('userApellidos') || '';
        document.getElementById('email').value = sessionStorage.getItem('userEmail') || '';
        document.getElementById('dni').value = sessionStorage.getItem('userDni') || '';
        document.getElementById('tel').value = sessionStorage.getItem('userTelefono') || '';
    }

    function mostrarAlerta(msg, tipo) {
        const a = document.getElementById('alertaReserva');
        a.innerText = msg; a.className = `alert alert-${tipo} mb-4`;
        a.classList.remove('d-none');
    }

    document.getElementById('formFinal').onsubmit = async (e) => {
        e.preventDefault();

        const dniReg = /^[0-9]{8}[TRWAGMYFPDXBNJZSQVHLCKE]$/i;
        const dniInput = document.getElementById('dni').value.trim().toUpperCase();

        if (!dniReg.test(dniInput)) { mostrarAlerta("DNI no válido (8 números y letra).", "danger"); return; }
        if (!citaId) { mostrarAlerta("Error: No se ha detectado la cita seleccionada.", "danger"); return; }

        const btn = document.getElementById('btnConfirmar');
        btn.disabled = true; btn.innerText = "Finalizando...";

        const pac = {
            nombre: document.getElementById('nom').value.trim().toUpperCase(),
            apellidos: document.getElementById('ape').value.trim().toUpperCase(),
            dni: dniInput,
            email: document.getElementById('email').value,
            telefono: document.getElementById('tel').value.trim()
        };

        if(modoRegistro === 'miembro') {
            pac.password = document.getElementById('pass').value;
        }

        try {

            const resP = await fetch('http://localhost:8080/api/pacientes/registro', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(pac)
            });
            const pData = await resP.json();

            // 2. Vincular cita con el ID del paciente obtenido
            await fetch(`http://localhost:8080/api/citas/actualizar/${citaId}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ pacienteId: pData.id, estado: "CONFIRMADA" })
            });

            new bootstrap.Modal(document.getElementById('modalExito')).show();
        } catch(e) {
            mostrarAlerta("Error al confirmar. Inténtalo de nuevo.", "danger");
            btn.disabled = false; btn.innerText = "CONFIRMAR MI CITA";
        }
    };
</script>
</body>
</html>
