<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario - FisioLG</title>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --verde-corp: #88c057; --verde-oscuro: #6fa343; }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background-color: #2c3e50;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('img/fondocalendario.png');
            background-size: cover;
            background-position: center;
            opacity: 0.5;
            z-index: -1;
        }

        .header-container {
            max-width: 1000px;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .selector-fecha-container {
            max-width: 1000px;
            margin: 0 auto 20px auto;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        #calendar {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .btn-salir {
            background-color: #ff4d4d;
            color: white; border: none;
            padding: 8px 16px; border-radius: 8px;
            font-weight: bold; transition: 0.3s;
        }

        .disponible-label {
            color: #155724;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px;
        }

        .fc-list-event { cursor: pointer !important; }
    </style>
</head>
<body>

<div class="header-container">
    <h2 class="m-0" style="color: white; text-shadow: 1px 1px 4px rgba(0,0,0,0.8);">Reserva tu Cita</h2>
    <button onclick="logout()" class="btn-salir shadow-sm">
        <i class="bi bi-box-arrow-right"></i> Salir
    </button>
</div>

<div class="selector-fecha-container">
    <label style="font-weight: bold; color: #555;">Día de consulta:</label>
    <input type="date" id="datepicker" class="form-control" style="width: auto;">
</div>

<div id="calendar"></div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        var datePicker = document.getElementById('datepicker');

        const hoy = new Date().toISOString().split('T')[0];
        datePicker.value = hoy;
        datePicker.setAttribute('min', hoy);

        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'listDay',
            locale: 'es',
            noEventsContent: 'No hay huecos disponibles para este día.',
            validRange: { start: hoy },
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: ''
            },

            eventDataTransform: function(eventData) {
                return {
                    id: eventData.id,
                    start: eventData.fechaHora,
                    title: 'DISPONIBLE'
                };
            },
            events: 'http://localhost:8080/api/citas/disponibles',

            eventContent: function(arg) {
                return {
                    html: `<div class="disponible-label">
                             <i class="bi bi-calendar-check-fill"></i> RESERVAR HORA
                           </div>`
                };
            },

            eventClick: function(info) {
                const citaId = info.event.id;
                const fecha = info.event.start.toLocaleDateString();
                const hora = info.event.start.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                if (confirm(`Has elegido el día ${fecha} a las ${hora}.\n¿Quieres ir al formulario para confirmar tus datos?`)) {
                    sessionStorage.setItem('citaIdReserva', citaId);
                    window.location.href = "registro.html?citaId=" + citaId;
                }
            }
        });

        calendar.render();

        datePicker.addEventListener('change', function() {
            calendar.gotoDate(this.value);
        });
    });

    function logout() {
        localStorage.clear();
        sessionStorage.clear();
        window.location.href = "index.html";
    }


    let tiempoInactividad;
    function resetTimer() {
        clearTimeout(tiempoInactividad);
        tiempoInactividad = setTimeout(logout, 300000);
    }
    window.onmousemove = resetTimer;
    window.onkeypress = resetTimer;
</script>

</body>
</html>
