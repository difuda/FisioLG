<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario - FisioLG</title>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --verde-corp: #88c057; --verde-oscuro: #6fa343; }


        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            position: relative;
            background-color: #2c3e50;
        }


        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('img/fondocalendario.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            opacity: 0.5;
            z-index: -1;
        }
        .selector-fecha-container, #calendar {
            background: rgba(255, 255, 255, 0.8) !important;
            backdrop-filter: blur(3px);
        }


        .header-container h2 {
            color: white !important;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .header-container {
            max-width: 1000px;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white !important;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }


        .selector-fecha-container {
            max-width: 1000px;
            margin: 0 auto 20px auto;
            background: rgba(255, 255, 255, 0.9); /* Blanco con 90% opacidad */
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        #calendar {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95); /* Fondo casi blanco para lectura clara */
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .btn-salir {
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-salir:hover { background-color: #cc0000; color: white; }

        .disponible-label { color: #155724; font-weight: bold; display: flex; align-items: center; gap: 8px; }

        input[type="date"] {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 5px 10px;
        }
        @media (max-width: 768px) {
            body { padding: 10px; }
            .header-container, .selector-fecha-container, #calendar {
                width: 100%;
                padding: 10px;
            }
            h2 { font-size: 1.2rem; }
            .btn-salir { padding: 5px 10px; font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="header-container">
    <h2 class="m-0" style="color: #2c3e50; text-shadow: 1px 1px 2px white;">Reserva tu Cita</h2>
    <button onclick="logout()" class="btn-salir shadow-sm">
        <i class="bi bi-box-arrow-right"></i> Salir
    </button>
</div>

<div class="selector-fecha-container">
    <label style="font-weight: bold; color: #555;">Día de consulta:</label>
    <input type="date" id="datepicker">
</div>

<div id="calendar"></div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        var datePicker = document.getElementById('datepicker');

        const hoy = new Date().toISOString().split('T')[0];
        datePicker.value = hoy;
        datePicker.setAttribute('min', hoy);

        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'listDay',
            locale: 'es',
            validRange: { start: hoy },
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: ''
            },
            buttonText: { today: 'Hoy' },
            events: 'http://localhost:8080/api/citas/disponibles',

            eventContent: function(arg) {
                return {
                    html: `<div class="disponible-label">
                             <i class="bi bi-calendar-check-fill"></i> RESERVAR HORA
                           </div>`
                };
            },

            eventClick: function(info) {
                const citaId = info.event.id;
                const fecha = info.event.start.toLocaleDateString();
                const hora = info.event.start.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                if (confirm(`Has elegido el día ${fecha} a las ${hora}. \n¿Quieres ir al formulario para introducir tus datos y confirmar?`)) {
                    window.location.href = "registro.html?citaId=" + citaId;
                }
            }
        });

        calendar.render();

        datePicker.addEventListener('change', function() {
            calendar.gotoDate(this.value);
        });
    });

    function logout() {
        localStorage.clear();
        window.location.href = "index.html";
    }

    // Timer de inactividad
    let tiempoInactividad;
    function resetTimer() {
        clearTimeout(tiempoInactividad);
        tiempoInactividad = setTimeout(logout, 300000);
    }
    window.onmousemove = resetTimer;
    window.onkeypress = resetTimer;
</script>

</body>
</html>
