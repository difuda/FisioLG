<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario - Fisioterapia y Osteopatía Lucía Garza</title>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --verde-corp: #88c057; --verde-oscuro: #6fa343; }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background-color: #2c3e50;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('img/fondocalendario.png');
            background-size: cover;
            background-position: center;
            opacity: 0.6;
            z-index: -1;
        }

        .header-container, .selector-fecha-container, #calendar {
            max-width: 850px;
            margin-left: auto;
            margin-right: auto;
        }

        .header-container {
            margin-top: 30px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .selector-fecha-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 25px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }

        #calendar {
            background: rgba(255, 255, 255, 0.98);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            margin-bottom: 50px;
        }

        .btn-salir {
            background-color: #ff4d4d;
            color: white; border: none;
            padding: 8px 20px; border-radius: 10px;
            font-weight: bold; transition: 0.3s;
        }

        .btn-salir:hover { background-color: #cc0000; transform: scale(1.05); }

        .disponible-label {
            color: #155724;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .header-container, .selector-fecha-container, #calendar {
                max-width: 100%;
                margin: 10px auto;
                border-radius: 12px;
            }
            .header-container h2 { font-size: 1.5rem; }
        }

        .fc-list-event { cursor: pointer !important; }
        .fc-list-event:hover { background-color: #f8f9fa !important; }
    </style>
</head>
<body>

<div class="header-container">
    <h2 class="m-0" style="color: white; text-shadow: 2px 2px 5px rgba(0,0,0,0.9);">Reserva tu Cita</h2>
    <button onclick="logout()" class="btn-salir shadow-sm">
        <i class="bi bi-box-arrow-right"></i> Salir
    </button>
</div>

<div class="selector-fecha-container">
    <label style="font-weight: bold; color: #444;"><i class="bi bi-calendar-event"></i> Día de consulta:</label>
    <input type="date" id="datepicker" class="form-control" style="width: auto; border-radius: 8px;">
</div>

<div id="calendar"></div>

<div class="modal fade" id="modalConfirmarCita" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 20px; border: none; box-shadow: 0 20px 40px rgba(0,0,0,0.4);">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold">Confirmar Selección</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body text-center pb-4">
                <i class="bi bi-calendar2-check text-success" style="font-size: 3.5rem;"></i>
                <p id="textoConfirmacion" class="mt-3 fs-5"></p>
                <p class="text-muted small">¿Deseas continuar para introducir tus datos personales?</p>
            </div>
            <div class="modal-footer border-0 justify-content-center">
                <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal" style="border-radius: 10px;">Cancelar</button>
                <button type="button" id="btnIrARegistro" class="btn btn-success px-4" style="border-radius: 10px; background-color: #88c057; border: none; font-weight: bold;">Sí, continuar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        var datePicker = document.getElementById('datepicker');
        const modalConfirmar = new bootstrap.Modal(document.getElementById('modalConfirmarCita'));
        const btnIrARegistro = document.getElementById('btnIrARegistro');
        let citaSeleccionadaId = null;

        const hoy = new Date().toISOString().split('T')[0];
        datePicker.value = hoy;
        datePicker.setAttribute('min', hoy);

        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'listDay',
            locale: 'es',
            noEventsContent: 'No hay huecos disponibles para este día.',
            validRange: { start: hoy },
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: ''
            },
            eventDataTransform: function(eventData) {
                return {
                    id: eventData.id,
                    start: eventData.fechaHora,
                    title: 'DISPONIBLE'
                };
            },
            events: 'http://localhost:8080/api/citas/disponibles',
            eventContent: function(arg) {
                return {
                    html: `<div class="disponible-label">
                             <i class="bi bi-clock-history"></i> RESERVAR HORA
                           </div>`
                };
            },
            eventClick: function(info) {
                citaSeleccionadaId = info.event.id;
                const fecha = info.event.start.toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                const hora = info.event.start.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                document.getElementById('textoConfirmacion').innerHTML = `Has elegido el <strong>${fecha}</strong> a las <strong>${hora} h</strong>.`;
                modalConfirmar.show();
            }
        });

        calendar.render();

        btnIrARegistro.addEventListener('click', function() {
            if (citaSeleccionadaId) {
                sessionStorage.setItem('citaIdReserva', citaSeleccionadaId);
                // LA MAGIA ESTÁ AQUÍ: Ahora te manda al archivo correcto
                window.location.href = "finalizar-reserva.html?citaId=" + citaSeleccionadaId;
            }
        });

        datePicker.addEventListener('change', function() {
            calendar.gotoDate(this.value);
        });
    });

    function logout() {
        localStorage.clear();
        sessionStorage.clear();
        window.location.href = "index.html";
    }

    let tiempoInactividad;
    function resetTimer() {
        clearTimeout(tiempoInactividad);
        tiempoInactividad = setTimeout(logout, 300000);
    }
    window.onmousemove = resetTimer;
    window.onkeypress = resetTimer;
</script>

</body>
</html>
