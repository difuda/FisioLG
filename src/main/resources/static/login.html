<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión FisioLG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --verde: #88c057; }
        body {
            background: #f0f2f2; height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', sans-serif; overflow: hidden; margin: 0;
        }
        .background-overlay {
            position: absolute; inset: 0; z-index: 0; opacity: 0.35; pointer-events: none;
            background: url("img/fondologin2.png") left -50px top 35% / contain no-repeat,
                        url("img/fondologin1.png") right -50px top 65% / contain no-repeat;
        }
        .login-card {
            background: white; padding: 45px; border-radius: 30px; width: 100%; max-width: 500px;
            text-align: center; z-index: 10; box-shadow: 0 30px 60px rgba(0,0,0,0.07);
        }
        .logo-img { max-width: 180px; margin-bottom: 10px; }
        .admin-title {
            font-family: 'Playfair Display', serif; font-size: 3rem; color: #333; margin-bottom: 30px;
            text-shadow: 1px 1px 0 #fff, 2px 2px 0 #d1d1d1, 4px 4px 8px rgba(0,0,0,0.15);
        }
        .form-control { border-radius: 12px; padding: 12px; margin-bottom: 15px; border: 1px solid #e0e0e0; background: #f9fbfc; }
        .form-control:focus { border-color: var(--verde); box-shadow: 0 0 0 4px rgba(136, 192, 87, 0.1); }
        .btn-login {
            background: var(--verde); color: white; border: none; border-radius: 12px; padding: 14px;
            width: 100%; font-weight: 700; transition: 0.3s; box-shadow: 0 5px 15px rgba(136,192,87,0.2);
        }
        .btn-login:hover { background: #76a84b; transform: translateY(-3px); }
    </style>
</head>
<body>

<div class="background-overlay"></div>

<div class="login-card">
    <img src="img/locoblanco.png" alt="Logo" class="logo-img">
    <h1 class="admin-title">Lucía Garza</h1>

    <form id="loginForm">
        <input type="text" id="usuario" class="form-control" placeholder="Usuario" required>
        <input type="password" id="password" class="form-control" placeholder="Contraseña" required>
        <button type="submit" class="btn btn-login">ENTRAR AL PANEL</button>
    </form>
    <div id="errorMsg" class="text-danger mt-3 small fw-bold" style="display:none;">Usuario o contraseña incorrectos.</div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const user = document.getElementById('usuario').value.trim().toLowerCase();
        const pass = document.getElementById('password').value.trim();


        if (["lucia", "anxela", "admin"].includes(user) && pass === 'FisioLG2026') {
            localStorage.setItem('userName', user);
            localStorage.setItem('isAdmin', 'true');
            window.location.href = "agenda-admin.html";
        } else {
            const err = document.getElementById('errorMsg');
            err.style.display = 'block';
            setTimeout(() => err.style.display = 'none', 3000);
        }
    });
</script>

</body>
</html>
