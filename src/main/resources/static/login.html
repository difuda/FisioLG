<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Gestión - Clínica FisioLG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #f0f2f2;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .background-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-image: url("img/fondologin2.png"), url("img/fondologin1.png");

            /* POSICIONAMIENTO CORREGIDO:
               - Mano (fondologin2): izquierda, 35% desde arriba (sube)
               - Columna (fondologin1): derecha, 65% desde arriba (baja)
            */
            background-position: left -50px top 35%, right -50px top 65%;

            background-repeat: no-repeat;
            background-size: contain;
            opacity: 0.35;
            pointer-events: none;
        }

        .login-card {
            background: white;
            padding: 45px 60px;
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.07);
            width: 100%;
            max-width: 650px;
            text-align: center;
            border: none;
            position: relative;
            z-index: 10;
        }

        .logo-container {
            margin-bottom: 5px;
        }
        .logo-img {
            max-width: 220px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .admin-title {
            font-family: 'Playfair Display', serif;
            font-size: 3.2rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 40px;
            letter-spacing: -1.5px;
            text-shadow:
                1px 1px 0px #fff,
                2px 2px 0px #d1d1d1,
                3px 3px 0px #b5b5b5,
                4px 4px 8px rgba(0,0,0,0.15);
        }

        .form-control {
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 18px;
            border: 1px solid #e0e0e0;
            background-color: #f9fbfc;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #88c057;
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(136, 192, 87, 0.1);
            outline: none;
        }

        .btn-login {
            background-color: #88c057;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            width: 100%;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(136, 192, 87, 0.25);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-login:hover {
            background-color: #76a84b;
            transform: translateY(-4px);
            box-shadow: 0 10px 22px rgba(136, 192, 87, 0.35);
        }

        #errorMsg {
            color: #dc3545;
            margin-top: 15px;
            font-size: 0.85rem;
            display: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="background-overlay"></div>

<div class="login-card">
    <div class="logo-container">
        <img src="img/locoblanco.png" alt="Logo Clínica FisioLG" class="logo-img">
    </div>

    <h1 class="admin-title">Lucía Garza</h1>

    <form id="loginForm">
        <input type="text" id="usuario" class="form-control" placeholder="Usuario" required>
        <input type="password" id="password" class="form-control" placeholder="Contraseña" required>
        <button type="submit" id="submitBtn" class="btn btn-login">Entrar al Panel</button>
    </form>
    <div id="errorMsg">Usuario o contraseña incorrectos.</div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const user = document.getElementById('usuario').value.trim().toLowerCase();
        const pass = document.getElementById('password').value.trim();

        if ((user === "lucia" || user === "anxela" || user === "admin") && pass === 'FisioLG2026') {
            localStorage.setItem('userName', user);
            localStorage.setItem('userId', '1');
            setTimeout(() => {
                window.location.href = "agenda-admin.html";
            }, 100);
        } else {
            document.getElementById('errorMsg').style.display = 'block';
        }
    });
</script>

</body>
</html>
